services:
  ingoschindler:
    image: nginx:1-alpine
    expose:
      - 80
    volumes:
      - ./ingoschindler.de/:/usr/share/nginx/html
      - ./nginx-status.conf:/etc/nginx/conf.d/default.conf:ro
      - logs_ingoschindler:/var/log/nginx
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.home-ingoschindler.rule=Host(`ingoschindler.de`)"
      - "traefik.http.routers.home-ingoschindler.entrypoints=web,websecure"
      - "traefik.http.routers.home-ingoschindler.tls.certresolver=letsencrypt"
      - "traefik.http.routers.home-ingoschindler.middlewares=redirect-https"
      - "traefik.http.services.home-ingoschindler.loadbalancer.server.port=80"

  hausschindler:
    image: nginx:1-alpine
    expose:
      - 80
    volumes:
